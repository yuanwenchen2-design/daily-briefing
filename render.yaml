services:
  - type: web
    name: daily-briefing
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEFAULT_LANGUAGE
        value: chinese
      - key: AUTO_PLAY
        value: "true"
      - key: STOCK_ANALYSIS_ENABLED
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
